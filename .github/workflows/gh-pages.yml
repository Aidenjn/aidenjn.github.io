name: github pages

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}

jobs:
  deploy:
    runs-on: ubuntu-22.04  # or ubuntu-latest
    permissions:
      contents: write  # Required for peaceiris/actions-gh-pages
    steps:
      - uses: actions/checkout@v4  # Updated from v2
        with:
          submodules: true
          fetch-depth: 0

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3  # Updated from v2
        with:
          hugo-version: 'latest'
          # extended: true  # Uncomment if using SCSS/Sass

      - name: Build
        run: hugo --minify

      - name: Deploy
        uses: peaceiris/actions-gh-pages@v4  # Updated from v3
        if: github.ref == 'refs/heads/main'
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
